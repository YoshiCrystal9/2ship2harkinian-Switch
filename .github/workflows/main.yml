name: generate-builds
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:

  generate-2ship-otr:
    runs-on: ubuntu-22.04
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        save: ${{ github.ref_name == github.event.repository.default_branch }}
        key: ${{ runner.os }}-otr-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-otr-ccache-${{ github.ref }}
          ${{ runner.os }}-otr-ccache
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat .github/workflows/apt-deps.txt) libzip-dev zipcmp zipmerge ziptool
    - name: Restore Cached deps folder
      uses: actions/cache/restore@v5
      with:
        key: ${{ runner.os }}-deps-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-deps-${{ github.ref }}-
          ${{ runner.os }}-deps-
        path: deps
    - name: Create deps folder
      run: mkdir -p deps
    - name: Install latest SDL
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        if [ ! -d "deps/SDL2-2.30.3" ]; then
          wget https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-2.30.3.tar.gz
          tar -xzf SDL2-2.30.3.tar.gz -C deps
        fi
        cd deps/SDL2-2.30.3
        ./configure --enable-hidapi-libusb
        make -j 10
        sudo make install
        sudo cp -av /usr/local/lib/libSDL* /lib/x86_64-linux-gnu/
    - name: Install latest tinyxml2
      run: |
        sudo apt-get remove libtinyxml2-dev
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        if [ ! -d "deps/tinyxml2-10.0.0" ]; then
          wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
          tar -xzf 10.0.0.tar.gz -C deps
        fi
        cd deps/tinyxml2-10.0.0
        mkdir -p build
        cd build
        cmake ..
        make
        sudo make install
    - name: Generate 2ship.o2r
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        cmake --no-warn-unused-cli -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE:STRING=Release
        cmake --build build-cmake --config Release --target Generate2ShipOtr -j3
    - name: Upload 2ship.o2r
      uses: actions/upload-artifact@v7
      with:
        name: 2ship.o2r
        path: 2ship.o2r
        retention-days: 3

  build-macos:
    needs: generate-2ship-otr
    runs-on: macos-14
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Setup Macports
      uses: melusina-org/setup-macports@v1
      with:
        parameters: '.github/macports.yml'
    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        key: ${{ runner.os }} # ccache-macos-{{ timestamp }}
        max-size: "2G"
        evict-old-files: job
        save: ${{ github.ref_name == github.event.repository.default_branch }}
    - name: Download 2ship.o2r
      uses: actions/download-artifact@v8
      with:
        name: 2ship.o2r
        path: build-cmake/mm
    - name: Build 2Ship
      env:
        CCACHE_SLOPPINESS: pch_defines,time_macros
      run: |
        cmake --no-warn-unused-cli -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE:STRING=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_C_FLAGS="-Xclang -fno-pch-timestamp" -DCMAKE_CXX_FLAGS="-Xclang -fno-pch-timestamp"
        cmake --build build-cmake -j
        (cd build-cmake && cpack)

        mv _packages/*.dmg 2Ship.dmg
        mv README.md readme.txt
    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: 2ship-mac
        path: |
          2Ship.dmg
          readme.txt

  build-linux:
    needs: generate-2ship-otr
    runs-on: ubuntu-22.04
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat .github/workflows/apt-deps.txt)
    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        save: ${{ github.ref_name == github.event.repository.default_branch }}
        key: ${{ runner.os }}-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref }}
          ${{ runner.os }}-ccache
    - name: Restore Cached deps folder
      id: restore-cache-deps
      uses: actions/cache/restore@v5
      with:
        key: ${{ runner.os }}-deps-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-deps-${{ github.ref }}-
          ${{ runner.os }}-deps-
        path: deps
    - name: Create deps folder
      run: mkdir -p deps
    - name: Install latest SDL
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        if [ ! -d "deps/SDL2-2.30.3" ]; then
          wget https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-2.30.3.tar.gz
          tar -xzf SDL2-2.30.3.tar.gz -C deps
        fi
        cd deps/SDL2-2.30.3
        ./configure --enable-hidapi-libusb
        make -j 10
        sudo make install
        sudo cp -av /usr/local/lib/libSDL* /lib/x86_64-linux-gnu/
    - name: Install latest tinyxml2
      run: |
        sudo apt-get remove libtinyxml2-dev
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        if [ ! -d "deps/tinyxml2-10.0.0" ]; then
          wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
          tar -xzf 10.0.0.tar.gz -C deps
        fi
        cd deps/tinyxml2-10.0.0
        mkdir -p build
        cd build
        cmake ..
        make
        sudo make install
    - name: Install libzip without crypto
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        if [ ! -d "deps/libzip-1.10.1" ]; then
          wget https://github.com/nih-at/libzip/releases/download/v1.10.1/libzip-1.10.1.tar.gz
          tar -xzf libzip-1.10.1.tar.gz -C deps
        fi
        cd deps/libzip-1.10.1
        mkdir -p build
        cd build
        cmake .. -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF
        make
        sudo make install
        sudo cp -av /usr/local/lib/libzip* /lib/x86_64-linux-gnu/
    - name: Download 2ship.o2r
      uses: actions/download-artifact@v8
      with:
        name: 2ship.o2r
        path: build-cmake/mm
    - name: Build 2Ship
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        cmake --no-warn-unused-cli -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE:STRING=Release -DBUILD_REMOTE_CONTROL=1
        cmake --build build-cmake --config Release -j3
        (cd build-cmake && cpack -G External)

        mv README.md readme.txt
        mv build-cmake/*.appimage 2ship.appimage
      env:
        CC: gcc-12
        CXX: g++-12
    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: 2ship-linux
        path: |
          2ship.appimage
          readme.txt
    - name: Save Cache deps folder
      if: ${{ github.ref_name == github.event.repository.default_branch }}
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.restore-cache-deps.outputs.cache-primary-key }}
        path: deps
  build-switch:
    needs: generate-2ship-otr
    runs-on: ${{ (vars.LINUX_RUNNER && fromJSON(vars.LINUX_RUNNER)) || 'ubuntu-latest' }}
    container:
      image: devkitpro/devkita64:latest
    steps:
    - uses: actions/checkout@v4
      with:
          submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build
        sudo apt-get remove -y cmake
        sudo dkp-pacman -R --noconfirm switch-tinyxml2
        wget https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.sh -O /tmp/cmake.sh
        sudo sh /tmp/cmake.sh --prefix=/usr/local/ --exclude-subdir

    - name: Fix dubious ownership error
      if: ${{ vars.LINUX_RUNNER }}
      run: git config --global --add safe.directory '*'
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.11
      with:
        key: ${{ runner.os }}-switch-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-switch-ccache-${{ github.ref }}
          ${{ runner.os }}-switch-ccache-
    - name: Build 2ship
      run: |
        cmake -H. -Bbuild-switch -GNinja -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake -DCMAKE_BUILD_TYPE:STRING=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache
        cmake --build build-switch --target 2ship_nro --config Release -j3
        wget -O gamecontrollerdb.txt https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt

        mv build-switch/mm/*.nro 2ship.nro
        mv README.md readme.txt
    - name: Download 2s2h.o2r
      uses: actions/download-artifact@v4
      with:
        name: 2ship.o2r
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: 2ship-switch
        path: |
          2ship.nro
          2ship.o2r
          readme.txt
          gamecontrollerdb.txt
  build-windows:
    needs: generate-2ship-otr
    runs-on: windows-latest
    steps:
    - name: Install dependencies
      run: |
        choco install ninja -y
        Remove-Item -Path "C:\ProgramData\Chocolatey\bin\ccache.exe" -Force -ErrorAction SilentlyContinue
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Configure sccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        variant: sccache
        max-size: "2G"
        evict-old-files: job
        save: ${{ github.ref_name == github.event.repository.default_branch }}
        key: ${{ runner.os }}-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref }}
          ${{ runner.os }}-ccache
    - name: Restore Cached VCPKG folder
      id: restore-cache-vcpkg
      uses: actions/cache/restore@v4
      with:
        key: ${{ runner.os }}-vcpkg-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-${{ github.ref }}-
          ${{ runner.os }}-vcpkg-
        path: vcpkg
    - name: Configure Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
    - name: Download 2ship.o2r
      uses: actions/download-artifact@v8
      with:
        name: 2ship.o2r
        path: build-windows/mm
    - name: Build 2Ship
      env:
        VCPKG_ROOT: ${{github.workspace}}/vcpkg
      run: |
        set $env:PATH="$env:USERPROFILE/.cargo/bin;$env:PATH"
        cmake -S . -B build-windows -G Ninja -DCMAKE_MAKE_PROGRAM=ninja -DCMAKE_BUILD_TYPE:STRING=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        cmake --build build-windows --config Release --parallel 10

        (cd build-windows && cpack)
        cd ..
        mv _packages/*.zip _packages/2ship-windows.zip
    - name: Unzip package
      run: Expand-Archive -Path _packages/2ship-windows.zip -DestinationPath 2ship-windows
    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: 2ship-windows
        path: 2ship-windows
    - name: Save Cache VCPKG folder
      if: ${{ github.ref_name == github.event.repository.default_branch }}
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.restore-cache-vcpkg.outputs.cache-primary-key }}
        path: vcpkg
